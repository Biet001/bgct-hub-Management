<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGCT Hub</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<style>
:root {
  --ff:'DM Sans',system-ui,sans-serif;
  --top-h:86px;
  --side-w:290px;
  --r:10px;--r-lg:16px;
  --t:180ms cubic-bezier(.4,0,.2,1);
  --t-slow:360ms cubic-bezier(.4,0,.2,1);
  --blue:#2563EB;--blue-h:#1D4ED8;--blue-l:#1e3a5f;--blue-m:#1e3058;
}
[data-theme="dark"]{
  --bg:#0A0F1E;--bg2:#0D1526;--surf:#111827;--surf2:#1F2937;
  --brd:#1F2937;--brd2:#374151;
  --txt:#F1F5F9;--txt2:#94A3B8;--txt3:#4B5563;
  --sh:0 1px 3px rgba(0,0,0,.5),0 8px 32px rgba(0,0,0,.4);
  --sh-sm:0 1px 2px rgba(0,0,0,.4);--sh-lg:0 24px 64px rgba(0,0,0,.6);
  --sb-bg:#050D1A;--sb-txt:rgba(255,255,255,.5);--sb-txt-h:rgba(255,255,255,.95);
  --sb-brd:rgba(255,255,255,.06);--sb-icon:rgba(255,255,255,.3);
  --sb-act:rgba(37,99,235,.85);--sb-hover:rgba(255,255,255,.05);
}
[data-theme="light"]{
  --bg:#F8FAFC;--bg2:#F1F5F9;--surf:#FFFFFF;--surf2:#F8FAFC;
  --brd:#E2E8F0;--brd2:#CBD5E1;
  --txt:#0F172A;--txt2:#475569;--txt3:#94A3B8;
  --sh:0 1px 3px rgba(15,23,42,.06),0 8px 32px rgba(15,23,42,.08);
  --sh-sm:0 1px 2px rgba(15,23,42,.05);--sh-lg:0 24px 64px rgba(15,23,42,.14);
  --blue-l:#EFF6FF;--blue-m:#DBEAFE;
  --sb-bg:#0F172A;--sb-txt:rgba(255,255,255,.55);--sb-txt-h:#fff;
  --sb-brd:rgba(255,255,255,.07);--sb-icon:rgba(255,255,255,.35);
  --sb-act:rgba(37,99,235,.9);--sb-hover:rgba(255,255,255,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{font-family:var(--ff);background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:background var(--t),color var(--t)}
button{cursor:pointer;border:none;background:none;font-family:var(--ff)}
input,select,textarea{font-family:var(--ff)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:99px}
::selection{background:var(--blue-m);color:var(--blue)}

/* ── TOPBAR ── */
#topbar{
  height:var(--top-h);min-height:var(--top-h);
  background:var(--surf);border-bottom:1px solid var(--brd);
  display:flex;align-items:center;padding:0 32px;gap:22px;
  z-index:200;box-shadow:var(--sh-sm);flex-shrink:0;
}
.brand{display:flex;align-items:center;gap:16px;flex-shrink:0;margin-right:6px}
.brand-logo{
  width:54px;height:54px;
  background:linear-gradient(145deg,#1E3A8A,#2563EB);
  border-radius:16px;display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;flex-shrink:0;
  box-shadow:0 6px 20px rgba(37,99,235,.35),0 2px 4px rgba(0,0,0,.2);
}
.brand-logo::before{content:'';position:absolute;top:-12px;right:-12px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.08)}
.brand-logo::after{content:'';position:absolute;bottom:-8px;left:-8px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.05)}
.brand-logo svg{width:26px;height:26px;fill:none;stroke:#fff;stroke-width:1.8;z-index:1;position:relative}
.brand-wordmark{display:flex;flex-direction:column;gap:3px}
.brand-name{font-size:20px;font-weight:700;color:var(--txt);letter-spacing:-.6px;line-height:1}
.brand-name span{color:var(--blue)}
.brand-tag{font-size:11px;font-weight:500;color:var(--txt3);letter-spacing:.04em;line-height:1;text-transform:uppercase}
.v-div{width:1px;height:36px;background:var(--brd);flex-shrink:0}
.top-tabs{display:flex;gap:2px;align-items:center}
.ttab{
  display:flex;align-items:center;gap:8px;
  padding:9px 18px;border-radius:10px;
  font-size:13.5px;font-weight:500;color:var(--txt2);
  transition:all var(--t);letter-spacing:-.1px;
}
.ttab svg{width:16px;height:16px;flex-shrink:0}
.ttab:hover{background:var(--bg2);color:var(--txt)}
.ttab.active{background:var(--blue-l);color:var(--blue);font-weight:600}
.top-search{flex:1;max-width:480px;position:relative;margin-left:12px}
.top-search input{
  width:100%;background:var(--bg2);border:1.5px solid var(--brd);
  border-radius:12px;padding:11px 16px 11px 42px;
  font-size:13.5px;color:var(--txt);outline:none;
  transition:border-color var(--t),box-shadow var(--t),background var(--t);font-family:var(--ff);
}
.top-search input::placeholder{color:var(--txt3)}
.top-search input:focus{border-color:var(--blue);box-shadow:0 0 0 4px rgba(37,99,235,.1);background:var(--surf)}
.top-search .si{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}
.top-search .si svg{width:16px;height:16px}
.kbd{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:10px;color:var(--txt3);background:var(--brd);padding:3px 7px;border-radius:5px;pointer-events:none;font-family:monospace}
#searchDrop{
  position:absolute;top:calc(100% + 8px);left:0;right:0;
  background:var(--surf);border:1px solid var(--brd);
  border-radius:14px;box-shadow:var(--sh-lg);z-index:999;
  display:none;overflow:hidden;max-height:360px;overflow-y:auto;
}
#searchDrop.open{display:block}
.sd-item{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--brd);transition:background var(--t)}
.sd-item:last-child{border-bottom:none}
.sd-item:hover{background:var(--bg2)}
.sd-dot{width:8px;height:8px;border-radius:50%;background:var(--blue);flex-shrink:0}
.sd-body{flex:1;min-width:0}
.sd-title{font-size:13px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sd-meta{font-size:11px;color:var(--txt3);margin-top:2px}
.sd-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:5px;flex-shrink:0}
.sd-empty{padding:24px;text-align:center;color:var(--txt3);font-size:13px}
.top-right{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.ib{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;color:var(--txt2);transition:all var(--t)}
.ib svg{width:17px;height:17px}
.ib:hover{background:var(--bg2);color:var(--txt)}
.btn-p{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border-radius:9px;font-size:12.5px;font-weight:600;background:var(--blue);color:#fff;transition:all var(--t);font-family:var(--ff);border:none;cursor:pointer}
.btn-p svg{width:14px;height:14px}
.btn-p:hover{background:var(--blue-h);transform:translateY(-1px);box-shadow:0 4px 16px rgba(37,99,235,.3)}
.btn-g{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:9px;font-size:12.5px;font-weight:500;background:transparent;color:var(--txt2);border:1px solid var(--brd);transition:all var(--t);font-family:var(--ff);cursor:pointer}
.btn-g svg{width:14px;height:14px}
.btn-g:hover{background:var(--bg2);color:var(--txt);border-color:var(--brd2)}
.btn-d{display:inline-flex;align-items:center;gap:7px;padding:7px 14px;border-radius:9px;font-size:12.5px;font-weight:500;background:rgba(239,68,68,.15);color:#FF5555;border:1px solid rgba(239,68,68,.3);transition:all var(--t);font-family:var(--ff);cursor:pointer}
.btn-d:hover{background:rgba(239,68,68,.26);color:#FF3333;border-color:rgba(239,68,68,.5)}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:7px}
.av{width:36px;height:36px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;cursor:pointer;flex-shrink:0}

/* ── LAYOUT ── */
#body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{
  width:var(--side-w);min-width:var(--side-w);
  background:var(--sb-bg);display:flex;flex-direction:column;
  overflow:hidden;transition:width var(--t-slow),min-width var(--t-slow);
  flex-shrink:0;
}
#sidebar.closed{width:0;min-width:0}
.sb-hd{padding:22px 16px 16px;border-bottom:1px solid var(--sb-brd);flex-shrink:0}
.sb-label{font-size:10.5px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--sb-icon);margin-bottom:12px;padding:0 4px}
.sb-search{position:relative}
.sb-search input{
  width:100%;background:rgba(255,255,255,.07);border:1px solid var(--sb-brd);
  border-radius:10px;padding:9px 14px 9px 34px;font-size:12.5px;
  color:var(--sb-txt-h);outline:none;font-family:var(--ff);transition:all var(--t);
}
.sb-search input::placeholder{color:var(--sb-icon)}
.sb-search input:focus{border-color:rgba(37,99,235,.7);background:rgba(255,255,255,.1)}
.sb-si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--sb-icon);pointer-events:none}
.sb-si svg{width:14px;height:14px}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:12px 10px 20px}
.sb-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1)}
.sn-team{margin-bottom:2px}
.sn-team-row{
  display:flex;align-items:center;gap:11px;
  padding:11px 12px;border-radius:10px;cursor:pointer;user-select:none;
  transition:background var(--t),color var(--t);color:var(--sb-txt);
}
.sn-team-row:hover{background:var(--sb-hover);color:var(--sb-txt-h)}
.sn-team-row.open{background:rgba(37,99,235,.15);color:#fff}
.sn-team-icon-wrap{
  width:32px;height:32px;border-radius:8px;
  background:rgba(255,255,255,.08);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all var(--t);
}
.sn-team-icon-wrap svg{width:16px;height:16px;stroke:rgba(255,255,255,.5);fill:none}
.sn-team-row:hover .sn-team-icon-wrap{background:rgba(37,99,235,.25)}
.sn-team-row:hover .sn-team-icon-wrap svg{stroke:rgba(255,255,255,.9)}
.sn-team-row.open .sn-team-icon-wrap{background:rgba(37,99,235,.35)}
.sn-team-row.open .sn-team-icon-wrap svg{stroke:#fff}
.sn-team-name{flex:1;font-size:13.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.2px}
.sn-cnt{font-size:10px;font-weight:700;background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);padding:2px 8px;border-radius:20px;flex-shrink:0;min-width:22px;text-align:center}
.sn-team-row:hover .sn-cnt{background:rgba(37,99,235,.25);color:rgba(255,255,255,.8)}
.sn-team-row.open .sn-cnt{background:rgba(37,99,235,.35);color:#fff}
.sn-children{display:none;padding-left:12px;margin-top:2px;padding-bottom:4px;border-left:1.5px solid rgba(255,255,255,.06);margin-left:27px}
.sn-children.open{display:block}
.sn-task-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:8px;cursor:pointer;user-select:none;
  transition:all var(--t);color:var(--sb-txt);margin-bottom:2px;
}
.sn-task-row:hover{background:var(--sb-hover);color:var(--sb-txt-h)}
.sn-task-row.active{background:var(--sb-act);color:#fff}
.sn-task-row:hover .sn-task-add,.sn-task-row.active .sn-task-add{opacity:1}
.sn-task-file-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all var(--t)}
.sn-task-file-icon svg{width:13px;height:13px;stroke:rgba(255,255,255,.3);fill:none}
.sn-task-row:hover .sn-task-file-icon svg{stroke:rgba(255,255,255,.7)}
.sn-task-row.active .sn-task-file-icon svg{stroke:#fff}
.sn-task-name{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-.1px}
.sn-task-add{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.12);color:#fff;opacity:0;transition:opacity var(--t),background var(--t);flex-shrink:0}
.sn-task-add svg{width:11px;height:11px}
.sn-task-add:hover{background:rgba(255,255,255,.22)}
.sb-ft{padding:14px 16px;border-top:1px solid var(--sb-brd);flex-shrink:0}
.sb-ft-btn{width:100%;display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;color:var(--sb-txt);font-size:12.5px;font-weight:500;transition:all var(--t);cursor:pointer;font-family:var(--ff)}
.sb-ft-btn svg{width:15px;height:15px;stroke:currentColor;fill:none;flex-shrink:0}
.sb-ft-btn:hover{background:var(--sb-hover);color:var(--sb-txt-h)}

/* ── MAIN ── */
#main{flex:1;overflow:hidden;display:flex;flex-direction:column;position:relative}
#pageStack{flex:1;position:relative;overflow:hidden}
.page{position:absolute;inset:0;overflow-y:auto;padding:28px 32px;opacity:0;transform:translateX(40px);pointer-events:none;transition:opacity var(--t-slow),transform var(--t-slow)}
.page.active{opacity:1;transform:none;pointer-events:auto}
.page.exit{opacity:0;transform:translateX(-40px)}

/* ── BREADCRUMB ── */
.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:22px;flex-wrap:wrap}
.bc{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:var(--txt3);padding:4px 8px;border-radius:6px;cursor:pointer;transition:all var(--t)}
.bc svg{width:12px;height:12px}
.bc:hover{color:var(--blue);background:var(--blue-l)}
.bc.cur{color:var(--txt2);font-weight:600;cursor:default}
.bc.cur:hover{background:transparent;color:var(--txt2)}
.bc-sep{color:var(--txt3);font-size:12px;opacity:.5}

/* ── PAGE HEADER ── */
.pg-hd{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:28px;gap:16px;flex-wrap:wrap}
.pg-hd-l h1{font-size:23px;font-weight:700;color:var(--txt);letter-spacing:-.5px;line-height:1.2}
.pg-hd-l p{font-size:13px;color:var(--txt2);margin-top:5px;line-height:1.5}
.pg-hd-r{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-start}

/* ── STATS ── */
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r-lg);padding:22px;transition:all var(--t);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue);opacity:0;transition:opacity var(--t)}
.stat-card:hover{box-shadow:var(--sh);transform:translateY(-2px)}
.stat-card:hover::before{opacity:1}
.stat-val{font-size:30px;font-weight:700;color:var(--txt);letter-spacing:-1px;line-height:1}
.stat-lbl{font-size:12px;color:var(--txt3);margin-top:6px;font-weight:500}

/* ── SECTION ── */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.sec-hd h2{font-size:14px;font-weight:700;color:var(--txt);letter-spacing:-.2px}

/* ── TEAM CARDS ── */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
.team-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:all var(--t-slow);display:flex;flex-direction:column}
.team-card:hover{box-shadow:var(--sh);transform:translateY(-2px);border-color:var(--brd2)}
.tc-stripe{height:3px;background:var(--blue);width:100%}
.tc-body{padding:20px;flex:1}
.tc-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.tc-mono{width:40px;height:40px;border-radius:10px;background:var(--blue-l);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;color:var(--blue);flex-shrink:0;border:1px solid var(--blue-m)}
.tc-name{font-size:14px;font-weight:700;color:var(--txt);letter-spacing:-.2px}
.tc-count{font-size:11px;color:var(--txt3);margin-top:2px}
.tc-chips{display:flex;flex-wrap:wrap;gap:5px}
.tc-chip{font-size:11px;font-weight:500;background:var(--bg2);color:var(--txt2);padding:3px 9px;border-radius:20px;border:1px solid var(--brd)}
.tc-foot{padding:12px 20px;border-top:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;background:var(--bg2)}
.tc-foot-txt{font-size:11.5px;color:var(--txt3);font-weight:500}
.tc-arr{width:26px;height:26px;border-radius:7px;background:var(--blue-l);display:flex;align-items:center;justify-content:center;color:var(--blue);transition:all var(--t)}
.tc-arr svg{width:13px;height:13px}
.team-card:hover .tc-arr{background:var(--blue);color:#fff}

/* ── TASK CARDS ── */
.task-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.task-card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:all var(--t-slow)}
.task-card:hover{box-shadow:var(--sh);transform:translateY(-2px);border-color:var(--brd2)}
.task-card-hd{padding:18px 18px 14px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--brd)}
.task-card-icon{width:34px;height:34px;border-radius:9px;background:var(--blue-l);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.task-card-icon svg{width:16px;height:16px;stroke:var(--blue);fill:none}
.task-card-name{font-size:13.5px;font-weight:700;color:var(--txt);flex:1;letter-spacing:-.2px}
.task-card-arr{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--txt3);transition:all var(--t)}
.task-card-arr svg{width:14px;height:14px;stroke:currentColor;fill:none}
.task-card:hover .task-card-arr{background:var(--blue-l);color:var(--blue)}
.task-doc-list{padding:4px 0}
.tdl-row{display:flex;align-items:center;gap:10px;padding:8px 18px;border-bottom:1px solid var(--brd);transition:padding-left var(--t)}
.tdl-row:last-child{border-bottom:none}
.task-card:hover .tdl-row{padding-left:22px}
.tdl-pill{font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;flex-shrink:0;letter-spacing:.03em;text-transform:uppercase}
.tdl-name{font-size:12px;font-weight:500;color:var(--txt2);flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tdl-ico{color:var(--txt3);flex-shrink:0}
.tdl-ico svg{width:12px;height:12px;display:block;fill:none;stroke:currentColor}
.tdl-ico.linked{color:var(--blue)}
.tdl-empty{padding:14px 18px;font-size:12px;color:var(--txt3);font-style:italic}

/* ── DOC TILES ── */
.type-section{margin-bottom:28px}
.type-sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--brd)}
.type-sec-hd-l{display:flex;align-items:center;gap:10px}
.type-dot{width:10px;height:10px;border-radius:50%;background:var(--blue);flex-shrink:0}
.type-nm{font-size:13px;font-weight:700;color:var(--txt);letter-spacing:-.2px}
.type-dc{font-size:11px;color:var(--txt3);font-weight:500}
.type-sec-hd-r{display:flex;gap:6px}
.doc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.doc-tile{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r-lg);overflow:hidden;transition:all var(--t-slow);display:flex;flex-direction:column;position:relative}
.doc-tile:hover{box-shadow:var(--sh);transform:translateY(-2px);border-color:var(--brd2)}
.dt-bar{position:absolute;top:0;left:0;bottom:0;width:3px;background:var(--blue)}
.dt-body{padding:18px 18px 14px 22px;flex:1}
.dt-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 9px;border-radius:4px;background:var(--blue-l);color:var(--blue);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.dt-title{font-size:13.5px;font-weight:700;color:var(--txt);letter-spacing:-.2px;margin-bottom:6px;line-height:1.4}
.dt-desc{font-size:12px;color:var(--txt2);line-height:1.6}
.dt-foot{padding:12px 18px 12px 22px;border-top:1px solid var(--brd);display:flex;gap:7px;background:var(--bg2)}
.dt-open{flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:8px;border-radius:8px;font-size:12px;font-weight:600;background:var(--blue);color:#fff;text-decoration:none;cursor:pointer;transition:all var(--t);font-family:var(--ff);border:none}
.dt-open svg{width:13px;height:13px;stroke:#fff;fill:none}
.dt-open:hover{background:var(--blue-h)}
.dt-open.no-link{background:transparent;color:var(--txt3);border:1px dashed var(--brd2)}
.dt-open.no-link:hover{background:var(--blue-l);color:var(--blue);border-color:var(--blue)}
.dt-icon-btn{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;border:1px solid var(--brd);color:var(--txt3);cursor:pointer;transition:all var(--t);flex-shrink:0;background:var(--surf)}
.dt-icon-btn svg{width:13px;height:13px;stroke:currentColor;fill:none}
.dt-icon-btn:hover{background:var(--bg2);color:var(--txt);border-color:var(--brd2)}
.dt-icon-btn.del:hover{background:rgba(239,68,68,.15);color:#FF5555;border-color:rgba(239,68,68,.35)}
.dt-add-tile{background:transparent;border:1.5px dashed var(--brd2);border-radius:var(--r-lg);display:flex;align-items:center;justify-content:center;min-height:140px;cursor:pointer;transition:all var(--t)}
.dt-add-tile:hover{border-color:var(--blue);background:var(--blue-l)}
.dt-add-inner{text-align:center;color:var(--txt3);transition:color var(--t)}
.dt-add-tile:hover .dt-add-inner{color:var(--blue)}
.dt-add-circle{width:38px;height:38px;border-radius:50%;border:1.5px dashed var(--brd2);display:flex;align-items:center;justify-content:center;margin:0 auto 8px;transition:all var(--t)}
.dt-add-circle svg{width:16px;height:16px;stroke:currentColor;fill:none}
.dt-add-tile:hover .dt-add-circle{border-color:var(--blue);background:var(--blue-l)}
.dt-add-lbl{font-size:12px;font-weight:600}

/* ── MAP ── */
.map-wrap{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r-lg);overflow:hidden;position:relative;height:calc(100vh - var(--top-h) - 120px);min-height:400px}
#mapSvg{width:100%;height:100%;cursor:grab;display:block}
#mapSvg.panning{cursor:grabbing}
.map-ctrl{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.map-box{position:absolute;background:var(--surf);border:1px solid var(--brd);border-radius:10px;font-family:var(--ff)}
.map-legend{top:14px;right:14px;padding:14px 16px}
.map-legend h4{font-size:10px;font-weight:700;color:var(--txt);margin-bottom:10px;text-transform:uppercase;letter-spacing:.08em}
.ml-r{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px;color:var(--txt2);font-weight:500}
.ml-d{flex-shrink:0}
.map-zoom{bottom:14px;right:14px;padding:6px 12px;font-size:11px;color:var(--txt2);font-weight:500}
.map-tt{position:absolute;pointer-events:none;background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:10px 14px;font-size:12px;display:none;z-index:50;min-width:130px;box-shadow:var(--sh)}
.map-tt.show{display:block}
.mtt-title{font-weight:700;font-size:12.5px;color:var(--txt);margin-bottom:3px}
.mtt-sub{font-size:11px;color:var(--txt2)}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:500;display:flex;align-items:center;justify-content:center;animation:ovIn .15s ease;backdrop-filter:blur(4px)}
@keyframes ovIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r-lg);width:95%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:var(--sh-lg);animation:mdIn .22s cubic-bezier(.4,0,.2,1);font-family:var(--ff)}
@keyframes mdIn{from{opacity:0;transform:scale(.96) translateY(-10px)}to{opacity:1;transform:none}}
.modal-hd{display:flex;align-items:flex-start;justify-content:space-between;padding:22px 24px;border-bottom:1px solid var(--brd);position:sticky;top:0;background:var(--surf);z-index:1}
.modal-hd h3{font-size:16px;font-weight:700;color:var(--txt);letter-spacing:-.3px}
.modal-hd p{font-size:12.5px;color:var(--txt2);margin-top:3px}
.modal-x{width:30px;height:30px;border-radius:7px;color:var(--txt3);display:flex;align-items:center;justify-content:center;transition:all var(--t);flex-shrink:0}
.modal-x svg{width:16px;height:16px;stroke:currentColor;fill:none}
.modal-x:hover{background:var(--bg2);color:var(--txt)}
.modal-body{padding:24px}
.modal-ft{padding:16px 24px;border-top:1px solid var(--brd);display:flex;gap:8px;justify-content:flex-end}
.a-tabs{display:flex;border-bottom:1px solid var(--brd);margin-bottom:22px}
.a-tab{padding:9px 16px;font-size:12.5px;font-weight:500;color:var(--txt2);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:all var(--t);font-family:var(--ff);display:flex;align-items:center;gap:6px;letter-spacing:-.1px}
.a-tab svg{width:14px;height:14px;stroke:currentColor;fill:none}
.a-tab:hover{color:var(--txt)}
.a-tab.active{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.a-sec{display:none}
.a-sec.active{display:block}
.f-row{margin-bottom:16px}
.f-row:last-child{margin-bottom:0}
.f-label{display:block;font-size:11px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.f-input,.f-sel,.f-ta{width:100%;background:var(--bg2);border:1px solid var(--brd);border-radius:9px;padding:9px 13px;font-size:13px;color:var(--txt);outline:none;transition:border-color var(--t),box-shadow var(--t),background var(--t);font-family:var(--ff)}
.f-input::placeholder,.f-ta::placeholder{color:var(--txt3)}
.f-input:focus,.f-sel:focus,.f-ta:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12);background:var(--surf)}
.f-sel option{background:var(--surf)}
.f-ta{resize:vertical;min-height:72px;line-height:1.6}
.f-hint{font-size:11px;color:var(--txt3);margin-top:5px}
.f-g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:5px}
.chip{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all var(--t)}
.chip:hover{transform:scale(1.15)}
.chip.sel{border-color:var(--txt);box-shadow:0 0 0 2px var(--surf)}
.dt-tbl{width:100%;border-collapse:collapse;font-size:12px}
.dt-tbl th{text-align:left;padding:8px 12px;font-size:10.5px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.07em;border-bottom:1px solid var(--brd)}
.dt-tbl td{padding:10px 12px;border-bottom:1px solid var(--brd);color:var(--txt2);vertical-align:middle}
.dt-tbl tr:last-child td{border-bottom:none}
.dt-tbl tr:hover td{background:var(--bg2)}
.td-p{font-weight:600;color:var(--txt)}
.td-acts{display:flex;gap:5px}
.ql-list{display:flex;flex-direction:column;gap:8px}
.ql-row{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--brd);border-radius:9px;padding:10px 12px}
.ql-dot{width:9px;height:9px;border-radius:50%;background:var(--blue);flex-shrink:0}
.ql-label{font-size:12.5px;font-weight:600;color:var(--txt);width:110px;flex-shrink:0}
.ql-inp{flex:1;background:var(--surf);border:1px solid var(--brd);border-radius:7px;padding:6px 10px;font-size:12px;color:var(--txt);outline:none;font-family:var(--ff);transition:border-color var(--t)}
.ql-inp:focus{border-color:var(--blue)}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 24px;text-align:center}
.empty-icon{color:var(--txt3);margin-bottom:16px}
.empty-icon svg{width:44px;height:44px;stroke:currentColor;fill:none}
.empty h3{font-size:15px;font-weight:700;color:var(--txt);margin-bottom:6px}
.empty p{font-size:13px;color:var(--txt2);line-height:1.6}
.hr{border:none;border-top:1px solid var(--brd);margin:20px 0}
.color-dot{width:11px;height:11px;border-radius:50%;display:inline-block;flex-shrink:0;vertical-align:middle}

/* ── LOGIN SCREEN ── */
#loginScreen{
  position:fixed;inset:0;z-index:10000;
  display:flex;align-items:center;justify-content:center;
  background:#060d1f;overflow:hidden;
}
#loginScreen canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.lc{
  position:relative;z-index:2;
  width:420px;max-width:94vw;
  background:linear-gradient(145deg,rgba(15,30,65,0.95),rgba(8,18,42,0.97));
  border:1px solid rgba(59,130,246,0.3);
  border-radius:24px;
  padding:44px 40px 40px;
  box-shadow:0 0 60px rgba(37,99,235,.2),0 32px 80px rgba(0,0,0,.7),inset 0 1px 0 rgba(255,255,255,.06);
  backdrop-filter:blur(20px);
  animation:lcIn .5s cubic-bezier(.4,0,.2,1);
}
@keyframes lcIn{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:none}}
.lc-logo{
  width:60px;height:60px;
  background:linear-gradient(145deg,#1e3a8a,#2563eb);
  border-radius:18px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 24px;
  box-shadow:0 8px 28px rgba(37,99,235,.45),0 2px 4px rgba(0,0,0,.3);
  position:relative;overflow:hidden;
}
.lc-logo::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);}
.lc-logo svg{width:28px;height:28px;fill:none;stroke:#fff;stroke-width:1.8;z-index:1;position:relative}
.lc-title{text-align:center;font-size:22px;font-weight:700;color:#f1f5f9;letter-spacing:-.5px;margin-bottom:6px}
.lc-sub{text-align:center;font-size:13px;color:rgba(148,163,184,.7);margin-bottom:36px;font-weight:400;letter-spacing:.01em}
.lc-field{margin-bottom:18px}
.lc-label{display:block;font-size:11px;font-weight:700;color:rgba(148,163,184,.8);text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px}
.lc-input{
  width:100%;background:rgba(255,255,255,.05);
  border:1.5px solid rgba(59,130,246,.2);
  border-radius:12px;padding:13px 16px;
  font-size:14px;color:#f1f5f9;outline:none;
  font-family:var(--ff);
  transition:border-color .2s,background .2s,box-shadow .2s;
  letter-spacing:.01em;
}
.lc-input::placeholder{color:rgba(148,163,184,.35)}
.lc-input:focus{border-color:rgba(59,130,246,.65);background:rgba(255,255,255,.08);box-shadow:0 0 0 4px rgba(37,99,235,.12);}
.lc-btn{
  width:100%;margin-top:26px;
  padding:14px;border-radius:12px;
  font-size:14px;font-weight:700;color:#fff;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  border:none;cursor:pointer;font-family:var(--ff);
  letter-spacing:.02em;
  transition:transform .15s,box-shadow .15s,background .15s;
  box-shadow:0 4px 20px rgba(37,99,235,.4);
  position:relative;overflow:hidden;
}
.lc-btn::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12),transparent);pointer-events:none}
.lc-btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(37,99,235,.55);background:linear-gradient(135deg,#3b82f6,#2563eb);}
.lc-btn:active{transform:translateY(0);}
.lc-btn.shaking{animation:lcShake .4s ease}
@keyframes lcShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.lc-err{
  margin-top:14px;
  padding:10px 14px;
  background:rgba(239,68,68,.1);
  border:1px solid rgba(239,68,68,.25);
  border-radius:10px;
  font-size:12px;font-weight:500;
  color:#fca5a5;text-align:center;
  display:none;
}
.lc-err.show{display:block;animation:lcIn .2s ease}
.lc-footer{margin-top:28px;padding-top:20px;border-top:1px solid rgba(255,255,255,.06);text-align:center;font-size:11px;color:rgba(148,163,184,.4);letter-spacing:.02em}

/* ── user role badge in topbar ── */
.role-badge{
  display:flex;align-items:center;gap:7px;
  padding:6px 13px;border-radius:8px;
  font-size:12px;font-weight:600;
  background:rgba(37,99,235,.15);
  color:rgba(147,197,253,.9);
  border:1px solid rgba(37,99,235,.25);
  cursor:default;
  flex-shrink:0;
}
.role-badge svg{width:13px;height:13px;stroke:currentColor;fill:none}
.logout-btn{
  display:flex;align-items:center;gap:6px;
  padding:6px 12px;border-radius:8px;
  font-size:12px;font-weight:500;
  color:var(--txt2);border:1px solid var(--brd);
  cursor:pointer;transition:all var(--t);font-family:var(--ff);
  background:transparent;
}
.logout-btn svg{width:13px;height:13px;stroke:currentColor;fill:none}
.logout-btn:hover{background:rgba(239,68,68,.08);color:#EF4444;border-color:rgba(239,68,68,.25);}

/* ── SUBTASK GRID ── */
.subtask-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-top:8px}
.subtask-card{background:var(--surf);border:1.5px solid var(--brd);border-radius:14px;padding:18px 18px 14px;cursor:pointer;transition:all var(--t);position:relative;overflow:hidden}
.subtask-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--sc-color,#2563EB);border-radius:4px 0 0 4px}
.subtask-card:hover{border-color:var(--blue);transform:translateY(-2px);box-shadow:var(--sh)}
.subtask-card-name{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:6px;padding-left:4px}
.subtask-card-meta{font-size:11.5px;color:var(--txt2);padding-left:4px;display:flex;align-items:center;gap:10px}
.subtask-card-add{display:flex;align-items:center;justify-content:center;gap:8px;border:2px dashed var(--brd2);border-radius:14px;padding:28px 18px;cursor:pointer;color:var(--txt3);font-size:13px;font-weight:500;transition:all var(--t)}
.subtask-card-add:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-l)}

/* ── FULLSCREEN MAP ── */
#fsmapOverlay{position:fixed;inset:0;z-index:5000;background:var(--bg);display:flex;flex-direction:column;animation:fsmIn .25s ease}
@keyframes fsmIn{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:none}}
.fsmap-header{display:flex;align-items:center;gap:14px;padding:16px 22px;border-bottom:1px solid var(--brd);flex-shrink:0;background:var(--surf)}
.fsmap-back{display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;color:var(--txt2);border:1.5px solid var(--brd);cursor:pointer;transition:all var(--t);background:transparent;font-family:var(--ff)}
.fsmap-back:hover{background:var(--surf2);color:var(--txt);border-color:var(--brd2)}
.fsmap-back svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5}
.fsmap-title{font-size:17px;font-weight:700;color:var(--txt)}
.fsmap-sub{font-size:12px;color:var(--txt3);margin-left:2px}
.fsmap-team-tabs{display:flex;align-items:center;gap:8px;padding:12px 22px;border-bottom:1px solid var(--brd);flex-shrink:0;overflow-x:auto;background:var(--bg)}
.fsmap-team-tabs::-webkit-scrollbar{height:2px}
.fsmap-tab{padding:7px 16px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all var(--t);white-space:nowrap;font-family:var(--ff);background:transparent}
.fsmap-tab:hover{background:var(--surf2)}
.fsmap-tab.active{border-color:currentColor}
.fsmap-ctrl{display:flex;align-items:center;gap:8px;padding:10px 22px;border-bottom:1px solid var(--brd);flex-shrink:0;background:var(--bg2)}
.fsmap-ctrl .btn-g{font-size:12px;padding:6px 12px}
.fsmap-wrap{flex:1;position:relative;overflow:hidden}
.fsmap-wrap svg{width:100%;height:100%;display:block}
.fsmap-tt{position:absolute;pointer-events:none;background:var(--surf);border:1px solid var(--brd);border-radius:10px;padding:10px 14px;font-size:12px;display:none;z-index:50;min-width:140px;box-shadow:var(--sh)}
.fsmap-tt.show{display:block}
.fsmap-info{position:absolute;bottom:14px;right:14px;background:var(--surf);border:1px solid var(--brd);border-radius:8px;padding:5px 12px;font-size:11px;color:var(--txt2);font-weight:500}

/* ── SYNC STATUS ── */
.sync-status{
  display:inline-flex;align-items:center;gap:8px;
  padding:7px 12px;border-radius:8px;
  font-size:12px;font-weight:500;
  background:var(--surf2);border:1px solid var(--brd);
  color:var(--txt2);margin-bottom:18px;
  width:fit-content;
}
.sync-status.connected{background:rgba(34,197,94,.07);border-color:rgba(34,197,94,.18);color:rgba(134,239,172,.85);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--txt3);flex-shrink:0}
.sync-dot.ok{background:#22C55E;}
.sync-dot.err{background:#EF4444}

/* ── TOAST ── */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(12px);
  background:var(--surf);color:var(--txt);
  border:1px solid var(--brd);
  padding:11px 24px;border-radius:24px;
  font-size:12.5px;font-weight:600;font-family:var(--ff);
  box-shadow:var(--sh-lg);z-index:9999;opacity:0;
  transition:opacity .2s ease,transform .2s ease;
  pointer-events:none;white-space:nowrap;letter-spacing:-.1px;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.t-ok{border-color:rgba(34,197,94,.4);color:#22C55E}
#toast.t-err{border-color:rgba(239,68,68,.3);color:#EF4444}
</style>
</head>
<body>

<!-- ══ LOGIN SCREEN ══ -->
<div id="loginScreen">
  <canvas id="geoCanvas"></canvas>
  <div class="lc">
    <div class="lc-logo">
      <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="13" y2="15"/></svg>
    </div>
    <div class="lc-title">BGCT Hub</div>
    <div class="lc-sub">Knowledge System &mdash; Sign in to continue</div>
    <div class="lc-field">
      <label class="lc-label" for="loginUser">Username</label>
      <input class="lc-input" id="loginUser" type="text" placeholder="Enter your username" autocomplete="username" onkeydown="if(event.key==='Enter')document.getElementById('loginPass').focus()">
    </div>
    <div class="lc-field">
      <label class="lc-label" for="loginPass">Passkey</label>

    </div>
    <button class="lc-btn" id="loginBtn" onclick="doLogin()">Sign In</button>
    <div class="lc-err" id="loginErr">Invalid username or passkey. Please try again.</div>
    <div class="lc-footer">BGCT Hub &mdash; Digitweb Lanka PVT Ltd</div>
  </div>
</div>

<header id="topbar" style="display:none">
  <div class="brand">
    <div class="brand-logo">
      <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="11" x2="15" y2="11"/><line x1="9" y1="15" x2="13" y2="15"/></svg>
    </div>
    <div class="brand-wordmark">
      <div class="brand-name"><span>BGCT</span> Hub</div>
      <div class="brand-tag">Knowledge System</div>
    </div>
  </div>
  <div class="v-div"></div>

/* ══ GEO CANVAS ANIMATION ══ */
function startGeoCanvas(){
  const canvas=document.getElementById('geoCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  let W,H,shapes=[];
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
  resize();
  window.addEventListener('resize',resize);
  const COLS=['rgba(37,99,235,','rgba(59,130,246,','rgba(29,78,216,','rgba(96,165,250,','rgba(147,197,253,'];
  function rnd(a,b){return a+Math.random()*(b-a);}
  function mkShape(){
    const type=Math.floor(Math.random()*3); // 0=tri,1=hex,2=ring
    return{
      x:rnd(0,W),y:rnd(0,H),
      r:rnd(18,65),
      rot:rnd(0,Math.PI*2),
      vx:rnd(-.28,.28),vy:rnd(-.28,.28),
      vr:rnd(-.008,.008),
      type,
      col:COLS[Math.floor(Math.random()*COLS.length)],
      alpha:rnd(.03,.11),
      stroke:Math.random()>.5,
    };
  }
  for(let i=0;i<55;i++)shapes.push(mkShape());
  function drawTri(x,y,r,rot){
    ctx.beginPath();
    for(let i=0;i<3;i++){
      const a=rot+i*(Math.PI*2/3);
      i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
    }
    ctx.closePath();
  }
  function drawHex(x,y,r,rot){
    ctx.beginPath();
    for(let i=0;i<6;i++){
      const a=rot+i*(Math.PI/3);
      i===0?ctx.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r):ctx.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
    }
    ctx.closePath();
  }
  function drawRing(x,y,r){ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);}
  let animId;
  function frame(){
    ctx.clearRect(0,0,W,H);
    shapes.forEach(s=>{
      ctx.save();
      if(s.stroke){
        ctx.strokeStyle=s.col+s.alpha+')';
        ctx.lineWidth=1.2;
      } else {
        ctx.fillStyle=s.col+s.alpha+')';
      }
      if(s.type===0)drawTri(s.x,s.y,s.r,s.rot);
      else if(s.type===1)drawHex(s.x,s.y,s.r,s.rot);
      else drawRing(s.x,s.y,s.r);
      s.stroke?ctx.stroke():ctx.fill();
      ctx.restore();
      s.x+=s.vx;s.y+=s.vy;s.rot+=s.vr;
      if(s.x<-s.r)s.x=W+s.r;if(s.x>W+s.r)s.x=-s.r;
      if(s.y<-s.r)s.y=H+s.r;if(s.y>H+s.r)s.y=-s.r;
    });
    animId=requestAnimationFrame(frame);
  }
  if(window._geoAnimId)cancelAnimationFrame(window._geoAnimId);
  frame();
  window._geoAnimId=animId;
}

            <span class="sn-task-name" style="font-size:11.5px">${st.name}</span>
          </div>`).join('')}
        </div>`:''}`;
        }).join('')}
        <div class="sn-task-row" onclick="addTaskSb('${team.id}')">
          <div class="sn-task-file-icon" style="opacity:.3">${IC.plus}</div>
          <span class="sn-task-name" style="opacity:.4;font-style:italic">Add task</span>
        </div>
      </div>
    </div>`;
  });
  el.innerHTML=html||`<div style="padding:24px;text-align:center;color:rgba(255,255,255,.2);font-size:12px">No results</div>`;
}

function toggleTeam(teamId,rowEl){
  const ch=document.getElementById('snc-'+teamId);
  if(!ch)return;
  const open=ch.classList.contains('open');
  if(open){ch.classList.remove('open');rowEl.classList.remove('open');}

function sbTeamClick(teamId){curTab='tree';syncTabUI();nav=[{type:'team',teamId}];renderSidebar(document.getElementById('sbSearch').value);pushPage(pageTeam(teamId));}
function sbTaskClick(teamId,taskId){curTab='tree';syncTabUI();nav=[{type:'team',teamId},{type:'task',teamId,taskId}];renderSidebar(document.getElementById('sbSearch').value);pushPage(pageTask(teamId,taskId));}
function sbSubtaskClick(teamId,taskId,subtaskId){curTab='tree';syncTabUI();nav=[{type:'team',teamId},{type:'task',teamId,taskId},{type:'subtask',teamId,taskId,subtaskId}];renderSidebar(document.getElementById('sbSearch').value);pushPage(pageSubtask(teamId,taskId,subtaskId));}

/* ══ TABS ══ */
function goTab(tab,el=null){
  curTab=tab;syncTabUI();
  if(tab==='home'){nav=[];renderSidebar();pushPage(pageHome());}
  else if(tab==='tree'){if(!nav.length)pushPage(pageTeams());else{const l=nav[nav.length-1];if(l.type==='team')pushPage(pageTeam(l.teamId));if(l.type==='task')pushPage(pageTask(l.teamId,l.taskId));if(l.type==='subtask')pushPage(pageSubtask(l.teamId,l.taskId,l.subtaskId));}}
  else if(tab==='map'){pushPage(pageMapContainer());setTimeout(renderMap,80);}
}
function syncTabUI(){document.querySelectorAll('.ttab').forEach(t=>t.classList.remove('active'));const el=document.getElementById('tb-'+curTab);if(el)el.classList.add('active');}

/* ══ PAGE ENGINE ══ */
function pushPage(html){
  const stack=document.getElementById('pageStack');
  const cur=stack.querySelector('.page.active');
  if(cur){cur.classList.remove('active');cur.classList.add('exit');setTimeout(()=>cur.remove(),380);}
  const pg=document.createElement('div');
  pg.className='page';pg.innerHTML=html;stack.appendChild(pg);
  requestAnimationFrame(()=>requestAnimationFrame(()=>pg.classList.add('active')));
}
function refreshPage(){
  if(curTab==='home'){pushPage(pageHome());return;}
  if(curTab==='map'){renderMap();return;}
  if(!nav.length){pushPage(pageTeams());return;}
  const l=nav[nav.length-1];
  if(l.type==='team')pushPage(pageTeam(l.teamId));
  if(l.type==='task')pushPage(pageTask(l.teamId,l.taskId));
  if(l.type==='subtask')pushPage(pageSubtask(l.teamId,l.taskId,l.subtaskId));
}
function bc(items){
  return`<div class="breadcrumb">${items.map((it,i)=>{
    const last=i===items.length-1;
    return(i>0?`<span class="bc-sep">›</span>`:'')+`<span class="bc ${last?'cur':''}" ${it.click&&!last?`onclick="${it.click}"`:''}>${it.label}</span>`;
  }).join('')}</div>`;
}
function navTeam(tid){nav=[{type:'team',teamId:tid}];renderSidebar();pushPage(pageTeam(tid));}
function navTask(tid,tkid){nav=[{type:'team',teamId:tid},{type:'task',teamId:tid,taskId:tkid}];renderSidebar();pushPage(pageTask(tid,tkid));}
function navSubtask(tid,tkid,stid){nav=[{type:'team',teamId:tid},{type:'task',teamId:tid,taskId:tkid},{type:'subtask',teamId:tid,taskId:tkid,subtaskId:stid}];renderSidebar();pushPage(pageSubtask(tid,tkid,stid));}
function navRoot(){nav=[];renderSidebar();pushPage(pageTeams());}

/* ══ TEAM PAGE ══ */

/* ══ TASK PAGE ══ */
function pageTask(teamId,taskId){
  const team=DB.teams.find(t=>t.id===teamId);
  const task=DB.tasks.find(t=>t.id===taskId);
  if(!team||!task)return pageTeam(teamId);
  const subtasks=(DB.subtasks||[]).filter(s=>s.taskId===taskId);
  const totalDocs=subtasks.reduce((sum,st)=>{
    return sum+(DB.subDocTypes[st.id]||[]).reduce((s,dt)=>s+dt.docs.length,0);
  },0);
  const cards=subtasks.map(st=>{
    const types=DB.subDocTypes[st.id]||[];
    const docCount=types.reduce((s,dt)=>s+dt.docs.length,0);
    const typeCount=types.length;
    return`<div class="subtask-card" style="--sc-color:${team.color}" onclick="navSubtask('${teamId}','${taskId}','${st.id}')">
      <div class="subtask-card-name">${st.name}</div>
      <div class="subtask-card-meta">
        <span>${typeCount} type${typeCount!==1?'s':''}</span>
        <span style="opacity:.4">·</span>
        <span>${docCount} doc${docCount!==1?'s':''}</span>
      </div>
    </div>`;
  }).join('');
  const addCard=`<div class="subtask-card-add" onclick="addSubtask('${teamId}','${taskId}')">
    <span style="display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:8px;background:var(--brd2)">${IC.plus}</span>
    Add Subtask
  </div>`;
  return`
  ${bc([{label:'Home',click:"goTab('home')"},{label:'All Teams',click:'navRoot()'},{label:team.name,click:`navTeam('${teamId}')`},{label:task.name}])}
  <div class="pg-hd">

      <button class="btn-p btn-sm" onclick="addSubtask('${teamId}','${taskId}')">${IC.plus} Add Subtask</button>
    </div>
  </div>
  ${subtasks.length===0?emptyState('No subtasks yet','Click "Add Subtask" to create a subtask — e.g. Standard Process, Advanced Process…'):`<div class="subtask-grid">${cards}${addCard}</div>`}`;
}

      </div>
      <h1>${subtask.name}</h1>

function renderMap(){
  const svg=document.getElementById('mapSvg');
  if(!svg)return;
  const W=svg.parentElement.clientWidth||900;
  const H=svg.parentElement.clientHeight||560;
  const ROOT_X=80,ROOT_Y=H/2,TEAM_X=ROOT_X+210,TASK_X=TEAM_X+210;
  const teams=DB.teams;
  const tSp=Math.max(56,Math.min(80,(H-60)/Math.max(teams.length,1)));
  const tTH=(teams.length-1)*tSp;
  const tSY=ROOT_Y-tTH/2;
  const pos={};
  pos['root']={x:ROOT_X,y:ROOT_Y};
  teams.forEach((team,ti)=>{
    const ty=tSY+ti*tSp;pos[team.id]={x:TEAM_X,y:ty};
    const tasks=DB.tasks.filter(t=>t.teamId===team.id);
    const kSp=Math.max(20,Math.min(32,(tSp*.9)/Math.max(tasks.length,1)));
    const kSY=ty-((tasks.length-1)*kSp)/2;
    tasks.forEach((tk,ki)=>{pos[tk.id]={x:TASK_X,y:kSY+ki*kSp};});
  });
  function cbez(x1,y1,x2,y2){const cx=(x1+x2)/2;return`M${x1},${y1} C${cx},${y1} ${cx},${y2} ${x2},${y2}`;}
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  let c=`<defs><filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
  <g id="mapG" transform="translate(${mapS.x},${mapS.y}) scale(${mapS.scale})">`;
  const rp=pos['root'];
  teams.forEach(team=>{
    const tp=pos[team.id];
    c+=`<path d="${cbez(rp.x+50,rp.y,tp.x-60,tp.y)}" fill="none" stroke="${team.color}" stroke-width="1.8" opacity="0.3"/>`;
    DB.tasks.filter(t=>t.teamId===team.id).forEach(tk=>{
      const kp=pos[tk.id];
      c+=`<path d="${cbez(tp.x+60,tp.y,kp.x-50,kp.y)}" fill="none" stroke="${team.color}" stroke-width="1.2" opacity="0.2"/>`;
    });
  });
  c+=`<g onmouseenter="showTT(event,'BGCT Hub','Knowledge System')" onmouseleave="hideTT()">
    <rect x="${rp.x-46}" y="${rp.y-24}" width="92" height="48" rx="14" fill="#2563EB" filter="url(#glow)"/>
    <text x="${rp.x}" y="${rp.y-5}" text-anchor="middle" font-size="12" font-weight="700" fill="#fff" font-family="DM Sans,system-ui">BGCT</text>
    <text x="${rp.x}" y="${rp.y+12}" text-anchor="middle" font-size="9.5" fill="rgba(255,255,255,.7)" font-family="DM Sans,system-ui">Hub</text>
  </g>`;
  teams.forEach(team=>{
    const tp=pos[team.id];const tasks=DB.tasks.filter(t=>t.teamId===team.id);
    const label=team.name.length>15?team.name.substring(0,13)+'...':team.name;
    const bW=Math.max(100,label.length*7.2+28);const safe=team.name.replace(/'/g,"\\'");
    c+=`<g style="cursor:pointer" onclick="openFullscreenMap('${team.id}')" onmouseenter="showTT(event,'${safe}','${tasks.length} tasks')" onmouseleave="hideTT()">
      <rect x="${tp.x-bW/2}" y="${tp.y-18}" width="${bW}" height="36" rx="10" fill="${team.color}18" stroke="${team.color}" stroke-width="1.8"/>
      <text x="${tp.x}" y="${tp.y+5}" text-anchor="middle" font-size="11.5" font-weight="700" fill="${team.color}" font-family="DM Sans,system-ui">${label}</text>
    </g>`;
  });
  teams.forEach(team=>{
    DB.tasks.filter(t=>t.teamId===team.id).forEach(tk=>{
      const kp=pos[tk.id];
      const subs=(DB.subtasks||[]).filter(s=>s.taskId===tk.id);
      const dc=subs.reduce((sum,st)=>(DB.subDocTypes[st.id]||[]).reduce((s,dt)=>s+dt.docs.length,sum),0);
      const label=tk.name.length>16?tk.name.substring(0,14)+'...':tk.name;
      const bW=Math.max(72,label.length*6.5+20);const safe=tk.name.replace(/'/g,"\\'");
      const filled=dc>0;
      c+=`<g style="cursor:pointer" onclick="mapClickTask('${team.id}','${tk.id}')" onmouseenter="showTT(event,'${safe}','${dc} doc${dc!==1?'s':''}')" onmouseleave="hideTT()">
        <rect x="${kp.x-bW/2}" y="${kp.y-13}" width="${bW}" height="26" rx="7"
          fill="${filled?team.color+'12':'transparent'}" stroke="${team.color}"
          stroke-width="${filled?1.4:.8}" stroke-dasharray="${filled?'none':'3 2'}" opacity="${filled?1:.65}"/>

/* ══ SEARCH ══ */
function openSearch(){document.getElementById('searchDrop').classList.add('open');}
function closeSearch(){document.getElementById('searchDrop').classList.remove('open');document.getElementById('gSearch').value='';}
function handleSearch(q){
  const drop=document.getElementById('searchDrop');
  q=q.trim().toLowerCase();
  if(!q){drop.classList.remove('open');return;}
  drop.classList.add('open');
  const results=[];
  DB.tasks.forEach(tk=>{
    const team=DB.teams.find(t=>t.id===tk.teamId);
    (DB.docTypes[tk.id]||[]).forEach(dt=>{
      dt.docs.forEach(doc=>{
        if(doc.name.toLowerCase().includes(q)||dt.name.toLowerCase().includes(q)||tk.name.toLowerCase().includes(q)||team?.name.toLowerCase().includes(q))
          results.push({team,task:tk,dt,doc});
      });
    });
    if((tk.name.toLowerCase().includes(q)||team?.name.toLowerCase().includes(q))&&!results.find(r=>r.task.id===tk.id&&!r.doc))
      results.push({team,task:tk,dt:null,doc:null,taskOnly:true});
  });
  if(!results.length){drop.innerHTML=`<div class="sd-empty">No results for "${q}"</div>`;return;}
  drop.innerHTML=results.slice(0,8).map(r=>{
    if(r.taskOnly)return`<div class="sd-item" onclick="navTask('${r.team?.id}','${r.task.id}');closeSearch()"><div class="sd-dot" style="background:${r.team?.color||'#2563EB'}"></div><div class="sd-body"><div class="sd-title">${r.task.name}</div><div class="sd-meta">${r.team?.name||''}</div></div><span class="sd-badge" style="background:#2563EB20;color:#2563EB">Task</span></div>`;
    return`<div class="sd-item" onclick="${r.doc.link&&r.doc.link!=='#'?`window.open('${r.doc.link}','_blank');toast('Opening…','ok')`:`navTask('${r.team?.id}','${r.task.id}')`};closeSearch()"><div class="sd-dot" style="background:${r.dt?.color||'#2563EB'}"></div><div class="sd-body"><div class="sd-title">${r.doc.name}</div><div class="sd-meta">${r.team?.name||''} › ${r.task.name}</div></div><span class="sd-badge" style="background:${r.dt?.color||'#2563EB'}20;color:${r.dt?.color||'#2563EB'}">${r.dt?.name||''}</span></div>`;
  }).join('');
}

function tasksRows(){return DB.tasks.map(tk=>{const team=DB.teams.find(t=>t.id===tk.teamId);const dc=(DB.docTypes[tk.id]||[]).reduce((s,t)=>s+t.docs.length,0);return`<tr><td class="td-p">${tk.name}</td><td><span style="font-size:11px;background:${team?.color}20;color:${team?.color};padding:2px 8px;border-radius:4px;font-weight:600">${team?.name||''}</span></td><td>${dc}</td><td><div class="td-acts"><button class="btn-g btn-sm" onclick="renameTask('${tk.id}')">${IC.edit}</button><button class="btn-d btn-sm" onclick="delTask('${tk.id}')">${IC.trash}</button></div></td></tr>`;}).join('')||'<tr><td colspan="4" style="text-align:center;color:var(--txt3);padding:16px;font-size:12px">No tasks</td></tr>';}

function saveGs(){
  const url=document.getElementById('gsU')?.value.trim();
  GS_URL=url;localStorage.setItem('bgct_gs_url',url);
  const dot=document.getElementById('syncStatus');
  if(dot){dot.className='sync-status'+(url?' connected':'');dot.innerHTML=`<div class="sync-dot ${url?'ok':''}"></div><span>${url?'Google Sheets connected':'Not connected to Google Sheets'}</span>`;}
  toast('URL saved!','ok');
}

async function testConnection(){
  if(!GS_URL){toast('Set the URL first.','err');return;}
  toast('Testing connection…');
  try{
    const res=await fetch(GS_URL+'?action=ping',{redirect:'follow'});
    const data=await res.json();
    if(data.status==='ok')toast('Connection successful ✓','ok');
    else toast('Error: '+data.message,'err');
  }catch(e){toast('Connection failed: '+e.message,'err');}
}

async function syncToSheets(){
  if(!isAdmin()){toast('Push to Sheets is restricted to Admin only.','err');return;}
  if(!GS_URL){toast('Set Apps Script URL in Admin → Settings first.','err');return;}
  toast('Syncing to Google Sheets…');
  try{
    const res=await fetch(GS_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'sync',data:DB})
    });
    const text=await res.text();
    try{
      const j=JSON.parse(text);
      if(j.status==='ok')toast('Synced to Google Sheets ✓','ok');
      else toast('Sync error: '+(j.message||'Unknown'),'err');
    }catch(pe){toast('Synced ✓','ok');}
  }catch(e){toast('Sync failed: '+e.message,'err');}
}

async function pullFromSheets(){
  if(!GS_URL){toast('Set Apps Script URL first.','err');return;}
  toast('Loading from Sheets…');
  try{
    const res=await fetch(GS_URL+'?action=load',{redirect:'follow'});
    const text=await res.text();
    const data=JSON.parse(text);
    if(data&&data.teams){DB=data;if(!DB.subtasks)DB.subtasks=[];if(!DB.subDocTypes)DB.subDocTypes={};save();renderSidebar();refreshPage();toast('Loaded from Sheets ✓','ok');}
    else toast('Error: '+(data.error||'No data'),'err');
  }catch(e){toast('Load failed: '+e.message,'err');}
}

function resetSample(){if(!confirm('Reset ALL data to sample?'))return;localStorage.removeItem('bgct_v4');load();closeModal();renderSidebar();refreshPage();toast('Reset to sample data.','ok');}

/* ══ UTILS ══ */
function emptyState(title,sub){return`<div class="empty"><div class="empty-icon">${IC.folder}</div><h3>${title}</h3><p>${sub}</p></div>`;}
let _tt;
function toast(msg,type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='';
  if(type==='ok')el.classList.add('t-ok');
  if(type==='err')el.classList.add('t-err');
  el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2700);
}
</script>
